<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Khushi!</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; color: #2c3e50; }
        .card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; }
        h1 { color: #2980b9; font-size: 2.2rem; }
        p { font-size: 1.1rem; line-height: 1.5; color: #34495e; }
        .emoji { font-size: 50px; margin-bottom: 10px; }
        .sparkle { animation: blink 1.5s infinite; color: #f1c40f; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">✨🎂✨</div>
        <h1>Happy Birthday, Khushi!</h1>
        <p>To my amazing friend Khushi, may your day be filled with as much laughter and "Khushi" (happiness) as you bring to everyone around you!</p>
        <p class="sparkle">Have a magical year ahead! ✨</p>
    </div>
</body>
</html>
